name: Keep Supabase Alive

on:
  schedule:
    # Runs every day at 8:00 AM UTC (1:30 PM IST) to prevent free-tier sleep
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    name: Ping Supabase REST API
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://reoskksryeqgehisaaho.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Supabase response status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase is alive and responding!"
          else
            echo "⚠️  Unexpected status code: $STATUS"
            exit 1
          fi
